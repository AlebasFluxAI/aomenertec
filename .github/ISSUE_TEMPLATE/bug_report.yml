name: 🐛 Reporte de Bug
description: Reportar un error o comportamiento inesperado en el sistema
title: "[BUG]: "
labels: ["type: bug", "status: needs-triage"]
assignees: []

body:
  - type: markdown
    attributes:
      value: |
        ¡Gracias por reportar un bug! Completá la mayor cantidad de información posible para que podamos reproducirlo y solucionarlo rápido.

  - type: textarea
    id: descripcion
    attributes:
      label: Descripción del bug
      description: Describí clara y concisamente qué está fallando.
      placeholder: Ej. Al intentar guardar un cliente nuevo, la aplicación tira error 500...
    validations:
      required: true

  - type: dropdown
    id: entorno
    attributes:
      label: Entorno donde ocurre
      description: ¿En qué entorno se reproduce el bug?
      options:
        - Local (Docker / Sail)
        - Producción (Ubuntu Server)
        - Ambos
        - No estoy seguro
    validations:
      required: true

  - type: dropdown
    id: dominio
    attributes:
      label: Dominio afectado
      description: ¿Qué dominio del sistema está afectado? (ver AGENTS.md)
      multiple: true
      options:
        - Admin
        - Client
        - NetworkOperator
        - Technician
        - MqttInput (IoT / MQTT)
        - EventLog
        - ConfigurationClient
        - Auth (JWT / Jetstream)
        - Billing / Invoicing
        - Broadcasting (Echo Server)
        - Scheduled Jobs / Cron
        - Infraestructura (Docker / Supervisor)
        - Otro / No estoy seguro
    validations:
      required: true

  - type: textarea
    id: pasos
    attributes:
      label: Pasos para reproducir
      description: Pasos exactos para reproducir el comportamiento.
      placeholder: |
        1. Ir a '...'
        2. Hacer click en '...'
        3. Scrollear hasta '...'
        4. Ver error
    validations:
      required: true

  - type: textarea
    id: esperado
    attributes:
      label: Comportamiento esperado
      description: ¿Qué debería haber pasado?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Comportamiento actual
      description: ¿Qué pasó realmente? Incluí mensajes de error exactos si los hay.
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs relevantes
      description: |
        Pegá logs de Laravel, MQTT, Supervisor, o navegador. Comandos útiles:
        - `make logs-app` — logs de Laravel
        - `make logs-mqtt` — logs de Mosquitto
        - `make supervisor-status` — estado de procesos
      render: shell
      placeholder: |
        [2026-04-19 10:30:00] production.ERROR: ...

  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots / Videos
      description: Si aplica, adjuntá capturas o videos del error.

  - type: input
    id: commit
    attributes:
      label: Commit / Versión
      description: Commit SHA o tag donde ocurre el bug. Sacalo con `git rev-parse HEAD`.
      placeholder: Ej. a1b2c3d o v1.2.0

  - type: textarea
    id: contexto
    attributes:
      label: Contexto adicional
      description: Cualquier otra info relevante (rol de usuario, datos del cliente afectado, frecuencia del error, etc.)

  - type: checkboxes
    id: checklist
    attributes:
      label: Checklist previo
      description: Antes de enviar, confirmá que hiciste esto
      options:
        - label: Busqué en issues existentes y no encontré un duplicado
          required: true
        - label: Limpié caché (`make cache-clear`) y el bug persiste
          required: false
        - label: Verifiqué el estado de Supervisor (`make supervisor-status`) si aplica a MQTT/Queue
          required: false
