services:
    laravel.test:
        build:
            context: .
            dockerfile: docker/Dockerfile
            args:
                WWWGROUP: '${WWWGROUP}'
        image: aomenertec/app
        extra_hosts:
            - 'host.docker.internal:host-gateway'
        ports:
            - '${APP_PORT:-80}:80'
            - '${VITE_PORT:-5173}:${VITE_PORT:-5173}'
            - '8443:8443'
        environment:
            WWWUSER: '${WWWUSER}'
            LARAVEL_SAIL: 1
            XDEBUG_MODE: '${SAIL_XDEBUG_MODE:-off}'
            XDEBUG_CONFIG: '${SAIL_XDEBUG_CONFIG:-client_host=host.docker.internal}'
            IGNITION_LOCAL_SITES_PATH: '${PWD}'
        volumes:
            - '.:/var/www/html'
        networks:
            - sail
            - enertec-shared
        depends_on:
            - pgsql
            - redis
            - mosquitto

    pgsql:
        image: 'postgres:14'
        ports:
            - '${FORWARD_DB_PORT:-5432}:5432'
        environment:
            PGPASSWORD: '${DB_PASSWORD:-secret}'
            POSTGRES_DB: '${DB_DATABASE}'
            POSTGRES_USER: '${DB_USERNAME}'
            POSTGRES_PASSWORD: '${DB_PASSWORD:-secret}'
        volumes:
            - 'sail-pgsql:/var/lib/postgresql/data'
            - './vendor/laravel/sail/database/pgsql/create-testing-database.sql:/docker-entrypoint-initdb.d/10-create-testing-database.sql'
        networks:
            - sail
            - enertec-shared
        healthcheck:
            test:
                - CMD
                - pg_isready
                - '-q'
                - '-d'
                - '${DB_DATABASE}'
                - '-U'
                - '${DB_USERNAME}'
            retries: 3
            timeout: 5s

    redis:
        image: 'redis:alpine'
        ports:
            - '${FORWARD_REDIS_PORT:-6379}:6379'
        volumes:
            - 'sail-redis:/data'
        networks:
            - sail
            - enertec-shared
        healthcheck:
            test:
                - CMD
                - redis-cli
                - ping
            retries: 3
            timeout: 5s

    mosquitto:
        image: 'eclipse-mosquitto:2.0'
        ports:
            - '${FORWARD_MQTT_PORT:-1883}:1883'
        volumes:
            - './docker/mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf'
            - './docker/mosquitto/passwd:/mosquitto/config/passwd'
            - 'sail-mosquitto-data:/mosquitto/data'
            - 'sail-mosquitto-log:/mosquitto/log'
        networks:
            - sail
            - enertec-shared
        healthcheck:
            test:
                - CMD
                - mosquitto_sub
                - '-t'
                - '$$SYS/#'
                - '-C'
                - '1'
                - '-i'
                - 'healthcheck'
                - '-W'
                - '3'
            retries: 3
            timeout: 5s
networks:
    sail:
        driver: bridge
    enertec-shared:
        external: true
volumes:
    sail-pgsql:
        driver: local
    sail-redis:
        driver: local
    sail-mosquitto-data:
        driver: local
    sail-mosquitto-log:
        driver: local
