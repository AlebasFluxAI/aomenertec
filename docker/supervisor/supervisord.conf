[supervisord]
nodaemon=true
user=root
logfile=/var/log/supervisor/supervisord.log
pidfile=/var/run/supervisord.pid

[program:laravel-server]
command=php artisan serve --host=0.0.0.0 --port=80
directory=/var/www/html
user=sail
autostart=true
autorestart=true
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0
stopwaitsecs=3600

[program:laravel-echo-server]
command=laravel-echo-server start
directory=/var/www/html
user=sail
autostart=true
autorestart=true
stderr_logfile=/var/log/supervisor/laravel-echo-server.err.log
stdout_logfile=/var/log/supervisor/laravel-echo-server.out.log
stopwaitsecs=3600

[program:mqtt-receiver]
command=python3 /usr/local/bin/receiveMqttEvent.py
directory=/var/www/html
user=sail
autostart=true
autorestart=true
stderr_logfile=/var/log/supervisor/mqtt-receiver.err.log
stdout_logfile=/var/log/supervisor/mqtt-receiver.out.log
stopwaitsecs=3600

[program:mqtt-realtime-receiver]
command=python3 /usr/local/bin/receiveMqttRealTimeEvent.py
directory=/var/www/html
user=sail
autostart=true
autorestart=true
stderr_logfile=/var/log/supervisor/mqtt-realtime-receiver.err.log
stdout_logfile=/var/log/supervisor/mqtt-realtime-receiver.out.log
stopwaitsecs=3600
